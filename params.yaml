models:
  linear_regression:
    search:
      fit_intercept: [True, False]          
  decision_tree:
    search:
      max_depth: [1, 2, 3, 4, 5, 10, 20]
      # min_samples_split: [1, 10, 20, 30, 50, 60, 70, 80, 90]
      # min_samples_leaf: [1, 2, 4, 8, 16, 32, 64]
      # min_impurity_decrease: [1, 2, 3, 4, 5]
  catboost:
    search:
      iterations: [800]
      learning_rate: [0.1]
      depth: [4]
  xgboost:
    search:
      n_estimators: [1000]
      learning_rate: [0.2]
      max_depth: [2]
  models:
  neural_network:
    search:
      hidden_layer_sizes: [[512]]
      activation: ['relu']
      optimizer: ['Adam']
      learning_rate: [0.01]
      epochs: [50]
      batch_size: [32]